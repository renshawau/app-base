name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck

      - run: pnpm build

      # Skipped when no API token is configured — repos created via the
      # Deploy to Cloudflare button use Workers Builds for deploys instead,
      # and shouldn't double-deploy (or fail CI) here. Set the
      # CLOUDFLARE_API_TOKEN secret only if you deploy via this workflow.
      - name: Deploy Worker
        if: env.CLOUDFLARE_API_TOKEN != ''
        working-directory: apps/web
        run: pnpm wrangler deploy
